name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked

      - name: Install frontend deps
        run: pnpm install

      - name: Build
        env:
          CFLAGS: "-Wno-declaration-after-statement"
          CXXFLAGS: "-Wno-declaration-after-statement"
        run: pnpm build && ./node_modules/.bin/tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc --no-bundle

      - uses: actions/upload-artifact@v4
        with:
          name: nrl-pulse-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/nrl-pulse.exe

  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf

      - name: Install frontend deps
        run: pnpm install

      - name: Build
        run: pnpm build && ./node_modules/.bin/tauri build --target x86_64-unknown-linux-gnu --no-bundle

      - uses: actions/upload-artifact@v4
        with:
          name: nrl-pulse-linux
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/nrl-pulse

  build-mac:
    name: macOS (ARM + Intel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: mac-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: mac-cargo-

      - name: Install frontend deps
        run: pnpm install

      - name: Build ARM
        run: pnpm build && ./node_modules/.bin/tauri build --target aarch64-apple-darwin --no-bundle

      - name: Build Intel x86_64
        run: ./node_modules/.bin/tauri build --target x86_64-apple-darwin --no-bundle

      - uses: actions/upload-artifact@v4
        with:
          name: nrl-pulse-mac-arm
          path: src-tauri/target/aarch64-apple-darwin/release/nrl-pulse

      - uses: actions/upload-artifact@v4
        with:
          name: nrl-pulse-mac-x64
          path: src-tauri/target/x86_64-apple-darwin/release/nrl-pulse

  release:
    name: Release
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    # push main 或手动触发时发布
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect artifacts
        run: |
          cp artifacts/nrl-pulse-windows/nrl-pulse.exe nrl-pulse-windows.exe
          cp artifacts/nrl-pulse-linux/nrl-pulse       nrl-pulse-linux
          cp artifacts/nrl-pulse-mac-arm/nrl-pulse     nrl-pulse-mac-arm
          cp artifacts/nrl-pulse-mac-x64/nrl-pulse     nrl-pulse-mac-x64

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            nrl-pulse-windows.exe
            nrl-pulse-linux
            nrl-pulse-mac-arm
            nrl-pulse-mac-x64
