name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked

      - name: Install frontend deps
        run: pnpm install

      - name: Build
        run: pnpm build && ./node_modules/.bin/tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc --no-bundle

      - uses: actions/upload-artifact@v4
        with:
          name: nrl-pulse-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/nrl-pulse.exe

  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf

      - name: Install frontend deps
        run: pnpm install

      - name: Build
        run: pnpm build && ./node_modules/.bin/tauri build --target x86_64-unknown-linux-gnu --no-bundle

      - uses: actions/upload-artifact@v4
        with:
          name: nrl-pulse-linux
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/nrl-pulse

  build-mac-arm:
    name: macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: mac-arm-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: mac-arm-cargo-

      - name: Install frontend deps
        run: pnpm install

      - name: Build
        run: pnpm build && ./node_modules/.bin/tauri build --target aarch64-apple-darwin --no-bundle

      - uses: actions/upload-artifact@v4
        with:
          name: nrl-pulse-mac-arm
          path: src-tauri/target/aarch64-apple-darwin/release/nrl-pulse

  build-mac-x64:
    name: macOS (Intel x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: mac-x64-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: mac-x64-cargo-

      - name: Install frontend deps
        run: pnpm install

      - name: Build
        run: pnpm build && ./node_modules/.bin/tauri build --target x86_64-apple-darwin --no-bundle

      - uses: actions/upload-artifact@v4
        with:
          name: nrl-pulse-mac-x64
          path: src-tauri/target/x86_64-apple-darwin/release/nrl-pulse

  release:
    name: Release
    needs: [build-windows, build-linux, build-mac-arm, build-mac-x64]
    runs-on: ubuntu-latest
    # 只在推送 tag 时创建 Release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mv artifacts/nrl-pulse-windows/nrl-pulse.exe artifacts/nrl-pulse-windows.exe
          mv artifacts/nrl-pulse-linux/nrl-pulse      artifacts/nrl-pulse-linux
          mv artifacts/nrl-pulse-mac-arm/nrl-pulse    artifacts/nrl-pulse-mac-arm
          mv artifacts/nrl-pulse-mac-x64/nrl-pulse    artifacts/nrl-pulse-mac-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/nrl-pulse-windows.exe
            artifacts/nrl-pulse-linux
            artifacts/nrl-pulse-mac-arm
            artifacts/nrl-pulse-mac-x64
